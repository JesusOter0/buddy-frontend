<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buddy - Iniciar sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

<div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
  <div class="text-center mb-2">
    <a href="index.html" class="text-2xl font-bold text-blue-600 inline-block">Buddy</a>
  </div>
  <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Iniciar sesión</h2>

  <form id="loginForm" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700">Correo electrónico</label>
      <input type="email" id="email" placeholder="ejemplo@correo.com" required
             class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required
             class="mt-1 w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
    </div>

    <div class="flex items-center justify-between mt-2">
      <div class="flex items-center">
        <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
        <label for="remember" class="ml-2 block text-sm text-gray-700">Recordarme</label>
      </div>
      <div class="text-sm">
        <a href="#" class="font-medium text-blue-600 hover:text-blue-500 hover:underline">¿Olvidaste tu contraseña?</a>
      </div>
    </div>

    <button type="submit" class="w-full bg-black text-white font-semibold py-2.5 px-4 rounded-lg hover:bg-gray-800 transition-colors mt-4">
      Entrar
    </button>
  </form>

  <div class="mt-6 flex items-center justify-between">
    <span class="border-b w-1/5 lg:w-1/4"></span>
    <span class="text-xs text-gray-500 uppercase font-medium">o</span>
    <span class="border-b w-1/5 lg:w-1/4"></span>
  </div>

  <button type="button" class="mt-6 w-full flex items-center justify-center border border-gray-300 rounded-lg py-2.5 px-4 hover:bg-gray-50 transition-colors">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="h-5 w-5 mr-2">
    <span class="text-sm font-medium text-gray-700">Continuar con Google</span>
  </button>

  <p class="mt-6 text-sm text-center text-gray-600">
    ¿No tienes una cuenta? <a href="registro.html" class="text-blue-600 font-medium hover:underline">Regístrate aquí</a>
  </p>
</div>

<script src="app.js"></script>
</body>
</html>
