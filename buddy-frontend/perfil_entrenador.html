<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buddy - Perfil de Entrenador</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

<nav class="flex items-center justify-between px-8 py-4 bg-white shadow-sm">
  <a href="index.html" class="text-2xl font-bold text-blue-600">Buddy</a>
  <div class="flex items-center space-x-4">
    <span class="text-gray-600 font-medium">¡Hola Entrenador!</span>
    <div class="h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
      E
    </div>
  </div>
</nav>

<main class="max-w-4xl mx-auto py-10 px-4">
  <div class="mb-8">
    <h1 class="text-3xl font-bold mb-2">Gestión de Perfil</h1>
    <p class="text-gray-600">Configura tus datos profesionales para empezar a gestionar atletas.</p>
  </div>

  <div class="flex space-x-4 mb-8 border-b pb-2">
    <a href="perfil.html" class="text-gray-500 font-medium hover:text-gray-800 pb-2 px-2 transition">Perfil de Atleta</a>
    <button class="text-blue-600 font-semibold border-b-2 border-blue-600 pb-2 px-2">Perfil de Entrenador</button>
  </div>

  <form class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Especialidad principal</label>
        <select class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white">
          <option>Nutrición Deportiva</option>
          <option>Pérdida de Peso</option>
          <option>Alto Rendimiento</option>
          <option>Fuerza y Acondicionamiento</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Años de experiencia</label>
        <div class="flex">
          <input type="number" placeholder="Ej. 5" class="w-full px-4 py-2 border border-gray-300 rounded-l-lg outline-none focus:ring-2 focus:ring-blue-500">
          <span class="bg-gray-100 border border-l-0 border-gray-300 px-4 py-2 rounded-r-lg text-gray-500">Años</span>
        </div>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Certificaciones o Títulos (Opcional)</label>
      <textarea rows="3" placeholder="Añade tus certificaciones relevantes..." class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
    </div>

    <div class="pt-6 flex justify-end">
      <button type="button" onclick="window.location.href='dashboard.html'" class="bg-black text-white px-8 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
        Guardar y Continuar
      </button>
    </div>
  </form>
</main>

<script src="app.js"></script>
</body>
</html>
