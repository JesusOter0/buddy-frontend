<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buddy - Gestión de Perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen">

<nav class="flex items-center justify-between px-8 py-4 bg-white shadow-sm">
  <a href="index.html" class="text-2xl font-bold text-blue-600">Buddy</a>
  <div class="flex items-center space-x-4">
    <span class="text-gray-600 font-medium">¡Hola Atleta!</span>
    <div class="h-10 w-10 bg-gray-200 rounded-full overflow-hidden">
      <img src="https://ui-avatars.com/api/?name=Atleta&background=random" alt="Avatar">
    </div>
  </div>
</nav>

<main class="max-w-4xl mx-auto py-10 px-4">
  <div class="mb-8">
    <h1 class="text-3xl font-bold mb-2">Gestión de Perfil</h1>
    <p class="text-gray-600">Cuéntanos más sobre ti para personalizar tu experience.</p>
  </div>

  <div class="flex space-x-4 mb-8 border-b pb-2">
    <button class="text-blue-600 font-semibold border-b-2 border-blue-600 pb-2 px-2">Perfil de Atleta</button>
    <a href="perfil_entrenador.html" class="text-gray-500 font-medium hover:text-gray-800 pb-2 px-2 transition">Perfil de Entrenador</a>
  </div>

  <form class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Selecciona tu género</label>
        <div class="flex space-x-4">
          <label class="flex items-center space-x-2 bg-gray-50 px-4 py-2 border rounded-lg cursor-pointer hover:bg-gray-100 w-full">
            <input type="radio" name="gender" value="male" class="text-blue-600 focus:ring-blue-500">
            <span>Masculino</span>
          </label>
          <label class="flex items-center space-x-2 bg-gray-50 px-4 py-2 border rounded-lg cursor-pointer hover:bg-gray-100 w-full">
            <input type="radio" name="gender" value="female" class="text-blue-600 focus:ring-blue-500">
            <span>Femenino</span>
          </label>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Edad</label>
        <div class="flex">
          <input type="number" placeholder="Ej. 25" class="w-full px-4 py-2 border border-gray-300 rounded-l-lg outline-none focus:ring-2 focus:ring-blue-500">
          <span class="bg-gray-100 border border-l-0 border-gray-300 px-4 py-2 rounded-r-lg text-gray-500">Años</span>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Peso</label>
        <div class="flex">
          <input type="number" placeholder="Ej. 70" class="w-full px-4 py-2 border border-gray-300 rounded-l-lg outline-none focus:ring-2 focus:ring-blue-500">
          <select class="bg-gray-100 border border-l-0 border-gray-300 px-4 py-2 rounded-r-lg text-gray-700 outline-none">
            <option>KG</option>
            <option>LB</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Altura</label>
        <div class="flex">
          <input type="number" placeholder="Ej. 175" class="w-full px-4 py-2 border border-gray-300 rounded-l-lg outline-none focus:ring-2 focus:ring-blue-500">
          <select class="bg-gray-100 border border-l-0 border-gray-300 px-4 py-2 rounded-r-lg text-gray-700 outline-none">
            <option>CM</option>
            <option>FT</option>
          </select>
        </div>
      </div>
    </div>

    <hr class="border-gray-200">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-3">¿Cuál es tu objetivo de fitness?</label>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Perder peso</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Ganar fuerza</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Ganar peso</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Reducir estrés</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Mejorar salud</span></label>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-3">¿Qué tipo de ejercicios disfrutas?</label>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Entrenamiento de fuerza</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Yoga o Pilates</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Cardio (Correr, Bici)</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>Deportes (Tenis, etc.)</span></label>
        <label class="flex items-center space-x-2"><input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500"> <span>HIIT</span></label>
      </div>
    </div>

    <div class="pt-6 flex justify-end">
      <button type="button" onclick="window.location.href='dashboard.html'" class="bg-black text-white px-8 py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
        Guardar y Continuar
      </button>
    </div>
  </form>
</main>

<script src="app.js"></script>
</body>
</html>
